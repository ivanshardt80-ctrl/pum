<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Приглашение</title>
    <style>
        /* Добавим нежный цветочный фон */
        body { 
            background: linear-gradient(135deg, #2d1b2e 0%, #0f0c29 100%); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 183, 197, 0.1) 0%, transparent 50%);
        }
        .page { display: none; padding: 20px; width: 100%; max-width: 500px; }
        .active { display: block; }
        .btn { padding: 15px 30px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #yes-btn { background: #ffb7c5; color: #333; }
        #no-btn { border: 2px solid #ffb7c5; background: transparent; color: #ffb7c5; position: relative; }
        
        /* Стильные картинки */
        img { width: 280px; height: 280px; border-radius: 20px; margin-bottom: 20px; border: 4px solid #fff; object-fit: cover; box-shadow: 0 0 20px rgba(255, 183, 197, 0.5); }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; background: rgba(255,255,255,0.05); border-radius: 10px; }
        td { padding: 10px; border: 1px solid #ffb7c5; }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <img src="https://i.pinimg.com/736x/8d/f3/f1/8df3f1396a84c8a24c56e3005891398c.jpg" alt="Anime Art">
        <h1>Хочешь пойти погулять?</h1>
        <button class="btn" id="yes-btn" onclick="nextPage(2)">Да!</button>
        <button class="btn" id="no-btn" onmouseover="moveBtn()">Нет</button>
    </div>

    <div id="page2" class="page">
        <img src="https://i.pinimg.com/736x/29/73/45/297345f8f87e59b56f8f533177699923.jpg" alt="Anime Art">
        <h2>Когда отправимся на поиски сирени?</h2>
        <button class="btn" id="yes-btn" onclick="document.getElementById('res-date').innerText='6 июня'; nextPage(3)">6 июня</button>
        <button class="btn" id="yes-btn" onclick="document.getElementById('res-date').innerText='7 июня'; nextPage(3)">7 июня</button>
    </div>

    <div id="page3" class="page">
        <img src="https://i.pinimg.com/736x/55/59/8d/55598d9e27c732049d5a7698544d9f6b.jpg" alt="Anime Art">
        <h2>И последнее...</h2>
        <textarea id="user-text" placeholder="Напиши пожелания..." style="width:250px; height:80px; padding:10px; border-radius:15px;"></textarea>
        <br><button class="btn" id="yes-btn" onclick="showResults()">Показать итог</button>
    </div>

    <div id="page4" class="page">
        <img src="https://i.pinimg.com/736x/c1/c1/81/c1c1815126839a9c4c45b73894709848.jpg" alt="Anime Art">
        <h2>Всё готово!</h2>
        <table>
            <tr><td>Дата:</td><td id="res-date"></td></tr>
            <tr><td>Планы:</td><td id="res-text"></td></tr>
        </table>
    </div>

    <script>
        function nextPage(n) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page' + n).classList.add('active'); }
        function showResults() { document.getElementById('res-text').innerText = document.getElementById('user-text').value; nextPage(4); }
        function moveBtn() { const btn = document.getElementById('no-btn'); btn.style.position = 'absolute'; btn.style.top = Math.random() * 70 + 'vh'; btn.style.left = Math.random() * 70 + 'vw'; }
    </script>
</body>
</html>
