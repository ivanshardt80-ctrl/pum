<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Приглашение</title>
    <style>
        body { background: #0f0c29; color: #fff; font-family: sans-serif; text-align: center; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .page { display: none; padding: 20px; width: 100%; max-width: 500px; }
        .active { display: block; }
        .btn { padding: 15px 30px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; font-size: 16px; }
        #yes-btn { background: #ff9a9e; color: #333; }
        #no-btn { border: 2px solid #ffb7c5; background: transparent; color: #ffb7c5; position: relative; }
        img { width: 250px; height: 250px; border-radius: 20px; margin-bottom: 20px; border: 4px solid #ffb7c5; object-fit: cover; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; background: rgba(255,255,255,0.1); border-radius: 10px; }
        td { padding: 10px; border: 1px solid #ffb7c5; }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Anime_waving.gif">
        <h1>Хочешь пойти погулять?</h1>
        <button class="btn" id="yes-btn" onclick="nextPage(2)">Да!</button>
        <button class="btn" id="no-btn" onmouseover="moveBtn()">Нет</button>
    </div>

    <div id="page2" class="page">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/22/Anime_thinking.gif">
        <h2>Когда отправимся на поиски сирени?</h2>
        <button class="btn" id="yes-btn" onclick="document.getElementById('res-date').innerText='6 июня'; nextPage(3)">6 июня</button>
        <button class="btn" id="yes-btn" onclick="document.getElementById('res-date').innerText='7 июня'; nextPage(3)">7 июня</button>
    </div>

    <div id="page3" class="page">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a1/Anime_writing.gif">
        <h2>И последнее...</h2>
        <textarea id="user-text" placeholder="Напиши пожелания..." style="width:250px; height:80px; padding:10px; border-radius:15px;"></textarea>
        <br>
        <button class="btn" id="yes-btn" onclick="showResults()">Показать итог</button>
    </div>

    <div id="page4" class="page">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d4/Anime_happy_dance.gif">
        <h2>Всё готово!</h2>
        <table>
            <tr><td>Дата:</td><td id="res-date"></td></tr>
            <tr><td>Планы:</td><td id="res-text"></td></tr>
        </table>
    </div>

    <script>
        function nextPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + n).classList.add('active');
        }
        function showResults() {
            document.getElementById('res-text').innerText = document.getElementById('user-text').value;
            nextPage(4);
        }
        function moveBtn() {
            const btn = document.getElementById('no-btn');
            btn.style.position = 'absolute';
            btn.style.top = Math.random() * 70 + 'vh';
            btn.style.left = Math.random() * 70 + 'vw';
        }
    </script>
</body>
</html>
